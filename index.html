    <script src="https://cdn.tailwindcss.com"></script>

<body class="bg-gray-50 font-sans">

    <!-- 顶部导航栏 -->
    <header class="bg-white shadow-sm sticky top-0 z-10">

            <h1 class="text-xl font-bold text-blue-600">模拟演示商城 (测试专用)</h1>

                <a href="#" class="hover:text-blue-500">个人中心</a>
            </div>
        </div>
    </header>

    <!-- 主体商品展示区域 -->
    <main class="max-w-6xl mx-auto px-4 py-8">

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
            <!-- 商品卡片 1 -->
            <div class="bg-white rounded-lg shadow overflow-hidden flex flex-col justify-between">
                <div class="p-4 bg-gray-200 h-48 flex items-center justify-center text-gray-400">
                    [商品图片占位符]
                </div>
                <div class="p-4">
                    <h3 class="font-bold text-gray-900 text-base">智能降噪无线耳机 Pro</h3>
                    <p class="text-gray-500 text-xs mt-1">支持主动降噪，30小时超长续航，原厂正品。</p>
                    <div class="mt-4 flex items-center justify-between">
                        <span class="text-red-500 font-bold text-lg">¥599.00</span>
                        <!-- 点击调用客服组件提供的外部接口 -->
                        <button onclick="window.openChatWithProduct('智能降噪无线耳机 Pro')" class="bg-blue-600 text-white text-xs px-3 py-1.5 rounded hover:bg-blue-700 transition">咨询客服</button>
                    </div>
                </div>
            </div>

            <!-- 商品卡片 2 -->
            <div class="bg-white rounded-lg shadow overflow-hidden flex flex-col justify-between">
                <div class="p-4 bg-gray-200 h-48 flex items-center justify-center text-gray-400">
                    [商品图片占位符]
                </div>
                <div class="p-4">
                    <h3 class="font-bold text-gray-900 text-base">极简风便携保温杯</h3>
                    <p class="text-gray-500 text-xs mt-1">316不锈钢材质，24小时保温保冷，450ml。</p>
                    <div class="mt-4 flex items-center justify-between">
                        <span class="text-red-500 font-bold text-lg">¥99.00</span>
                        <button onclick="window.openChatWithProduct('极简风便携保温杯')" class="bg-blue-600 text-white text-xs px-3 py-1.5 rounded hover:bg-blue-700 transition">咨询客服</button>
                    </div>
                </div>
            </div>

            <!-- 商品卡片 3 -->
            <div class="bg-white rounded-lg shadow overflow-hidden flex flex-col justify-between">
                <div class="p-4 bg-gray-200 h-48 flex items-center justify-center text-gray-400">
                    [商品图片占位符]
                </div>
                <div class="p-4">
                    <h3 class="font-bold text-gray-900 text-base">多功能人体工学办公椅</h3>
                    <p class="text-gray-500 text-xs mt-1">高弹透气网面，自适应腰托，可调扶手。</p>
                    <div class="mt-4 flex items-center justify-between">
                        <span class="text-red-500 font-bold text-lg">¥899.00</span>
                        <button onclick="window.openChatWithProduct('多功能人体工学办公椅')" class="bg-blue-600 text-white text-xs px-3 py-1.5 rounded hover:bg-blue-700 transition">咨询客服</button>
                    </div>
                </div>
            </div>
        </div>
